<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroMed Premium | Simulador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .option-card:hover { border-color: #3b82f6; background-color: #eff6ff; }
        .selected-option { border-color: #3b82f6; background-color: #dbeafe; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="bg-indigo-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-stethoscope"></i> NeuroMed Premium
            </h1>
            <div id="stats" class="text-sm bg-indigo-800 px-3 py-1 rounded-full">
                Questão: <span id="current-idx">1</span> / <span id="total-count">0</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-4xl">
        <div id="question-container" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
            <div class="flex gap-2 mb-4">
                <span id="badge-banca" class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded">UFG</span>
                <span id="badge-area" class="bg-slate-100 text-slate-600 text-xs font-bold px-2 py-1 rounded">CIRURGIA</span>
            </div>
            
            <p id="enunciado" class="text-lg leading-relaxed mb-8 font-medium">
                Carregando questão...
            </p>

            <div id="options-space" class="space-y-3">
                </div>
        </div>

        <div class="flex justify-between items-center gap-4">
            <button onclick="prevQuestao()" class="flex-1 bg-white border border-slate-300 p-4 rounded-xl hover:bg-slate-50 transition">
                <i class="fas fa-chevron-left mr-2"></i> Anterior
            </button>
            <button onclick="checkResposta()" class="flex-1 bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 shadow-md transition">
                Confirmar Resposta
            </button>
            <button onclick="nextQuestao()" class="flex-1 bg-white border border-slate-300 p-4 rounded-xl hover:bg-slate-50 transition">
                Próxima <i class="fas fa-chevron-right ml-2"></i>
            </button>
        </div>
    </main>

    <script>
        let questoes = [];
        let index = 0;

        async function loadQuestoes() {
            const response = await fetch('http://SEU_IP_DO_VPS:5000/api/questoes');
            questoes = await response.json();
            document.getElementById('total-count').innerText = questoes.length;
            renderQuestao();
        }

        function renderQuestao() {
            const q = questoes[index];
            document.getElementById('enunciado').innerText = q.enunciado;
            document.getElementById('current-idx').innerText = index + 1;
            document.getElementById('badge-banca').innerText = q.banca + " " + q.ano;
            document.getElementById('badge-area').innerText = q.area;

            const space = document.getElementById('options-space');
            space.innerHTML = '';
            
            ['a', 'b', 'c', 'd', 'e'].forEach(letra => {
                if(q['alt_'+letra]) {
                    space.innerHTML += `
                        <div onclick="selectOption('${letra}')" id="opt-${letra}" 
                             class="option-card border-2 border-slate-100 p-4 rounded-xl cursor-pointer transition flex items-center gap-3">
                            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-sm">${letra.toUpperCase()}</span>
                            <span>${q['alt_'+letra]}</span>
                        </div>
                    `;
                }
            });
        }

        function selectOption(letra) {
            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected-option'));
            document.getElementById('opt-'+letra).classList.add('selected-option');
        }

        function nextQuestao() { if(index < questoes.length - 1) { index++; renderQuestao(); } }
        function prevQuestao() { if(index > 0) { index--; renderQuestao(); } }

        loadQuestoes();
    </script>
</body>
</html>
