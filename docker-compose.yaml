version: '3.8'
services:
  backend:
    build: 
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: neuromed-api
    environment:
      - PORT=5000
    volumes:
      - neuromed_data:/app/data # Persistência do Banco
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/questoes"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: neuromed-web
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - coolify
    depends_on:
      - backend

volumes:
  neuromed_data:
    driver: local

networks:
  coolify:
    external: true